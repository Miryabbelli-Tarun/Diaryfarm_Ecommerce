{% extends 'app/base.html' %}
{% load static %}
{% block main-content %}
<div class="container my-5 text-center">
    <div id="payment-box">
        <h2 class="mb-4">Secure Bank Payment</h2>
        <div class="card mx-auto shadow" style="max-width: 450px; border-top: 5px solid #198754;">
            <div class="card-body p-4 text-start">
                <p class="text-center fw-bold">Amount to Pay: Rs. {{totalamount}}</p>
                <hr>
                <form id="bank-form" action="{% url 'orderplaced' %}" method="GET">
                    <input type="hidden" name="custid" value="{{custid}}">
                    
                    <div class="mb-3">
                        <label class="form-label">Card Number</label>
                        <input type="text" class="form-control" placeholder="1234 5678 9101 1121" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Expiry</label>
                            <input type="text" class="form-control" placeholder="MM/YY" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">CVV</label>
                            <input type="password" class="form-control" placeholder="***" maxlength="3" required>
                        </div>
                    </div>
                    <button type="button" onclick="fakeProcessing()" class="btn btn-success w-100 fw-bold">Pay Now</button>
                </form>
            </div>
        </div>
    </div>

    <div id="loading-ui" style="display:none;" class="my-5">
        <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
        <h4 class="mt-3">Connecting to Bank...</h4>
        <p>Please do not refresh the page.</p>
    </div>
</div>

<script>
function fakeProcessing() {
    document.getElementById('payment-box').style.display = 'none';
    document.getElementById('loading-ui').style.display = 'block';
    // Wait 3 seconds then submit to payment_done view
    setTimeout(() => {
        document.getElementById('bank-form').submit();
    }, 3000);
}
</script>
{% endblock main-content %}
